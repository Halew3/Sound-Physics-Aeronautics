modLoader = "javafml"
loaderVersion = "*"
license = "GPL"
issueTrackerURL = "https://github.com/Halew3/Sound-Physics-Aeronautics/issues"
[[mods]]
modId = "sound_physics_remastered"
version = "${mod_version}"
displayName = "${mod_display_name}"
displayURL = "https://github.com/Halew3/Sound-Physics-Aeronautics"
logoFile = "icon.png"
authors = "Sonic Ether, vlad2305m, Max Henkel"
credits = "Sonic Ether, vlad2305m, Max Henkel; SPR Aeronautics fork by Halew3"
description = '''Sound Physics Aeronautics is a NeoForge 1.21.1 fork of Sound Physics Remastered focused on Create Aeronautics and Sable moving sublevels.

It preserves Sound Physics Remastered-style occlusion, reverb, and absorption while adding moving sublevel acoustic support, long-range Aeronautics propeller audio, Doppler handling for supported moving sources, and safer sound policy behavior for modded Create/Aeronautics packs.

This fork keeps the mod id sound_physics_remastered, so it is a drop-in replacement and cannot be installed alongside upstream Sound Physics Remastered.'''
displayTest = "IGNORE_ALL_VERSION"
[[dependencies.sound_physics_remastered]]
modId = "neoforge"
type = "required"
versionRange = "${neoforge_dependency}"
ordering = "NONE"
side = "BOTH"
[[dependencies.sound_physics_remastered]]
modId = "minecraft"
type = "required"
versionRange = "[1.21,1.21.1]"
ordering = "NONE"
side = "BOTH"
[[dependencies.sound_physics_remastered]]
modId = "cloth_config"
type = "optional"
versionRange = "[${cloth_config_version},)"
ordering = "AFTER"
side = "BOTH"
[[dependencies.sound_physics_remastered]]
modId = "voicechat"
type = "optional"
versionRange = "[1.21-2.3.0,)"
ordering = "AFTER"
side = "BOTH"
[[dependencies.sound_physics_remastered]]
modId = "sable"
type = "optional"
versionRange = "${sable_mod_version_range}"
ordering = "AFTER"
side = "BOTH"
