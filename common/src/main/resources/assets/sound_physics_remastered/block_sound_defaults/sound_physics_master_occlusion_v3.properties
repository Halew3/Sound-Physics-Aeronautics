# Sound Physics Remastered block acoustics master pack v3 -- material pass
# Generated for Alec's modpack, excluding Create / Create Aeronautics / Simulated.
#
# IMPORTANT: SPR uses two separate runtime files: block occlusion and block reflectivity.
# This pack therefore ships both files plus this combined reference.
#
# Baseline used from SPR source:
# Reflectivity: stone/deepslate/basalt/calcite/amethyst/bone ~= 1.5; metal/copper ~= 1.25; glass ~= 0.75; wood ~= 0.4; wool/honey/moss ~= 0.1.
# Occlusion: wool ~= 1.5; moss ~= 0.75; honey ~= 0.5; glass/snow/powder_snow/bamboo ~= 0.1; vines/crops/ladders/chains/amethyst buds ~= 0; water ~= 0.25; lava ~= 0.75.
#
# V3 philosophy: do NOT assign by theme alone. Pollen puff != pollen bricks; glass crystal != stone wall; scaffold != metal cube.
# Keys are block IDs with escaped colons, matching SPR's properties format.

# ---- Active occlusion overrides ----
